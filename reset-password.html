<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reset Password — NirogAI</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#E8FAF8 0%,#F0FDF9 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:white;border-radius:24px;padding:36px 32px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(10,181,160,.12);}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:28px;justify-content:center;}
.logo-dot{width:36px;height:36px;background:linear-gradient(135deg,#0AB5A0,#067A72);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:16px;}
.logo span{font-size:20px;font-weight:700;color:#1A2E2C;}
.logo em{color:#0AB5A0;font-style:normal;}
h2{font-size:22px;font-weight:800;color:#1A2E2C;margin-bottom:6px;text-align:center;}
p.sub{font-size:13px;color:#6B8F8C;text-align:center;margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;color:#6B8F8C;letter-spacing:.6px;margin-bottom:6px;}
.pw-wrap{position:relative;}
.pw-wrap input{width:100%;padding:13px 44px 13px 14px;border:1.5px solid #E2EAE9;border-radius:12px;font-size:14px;font-family:inherit;outline:none;color:#1A2E2C;transition:.2s;}
.pw-wrap input:focus{border-color:#0AB5A0;box-shadow:0 0 0 3px rgba(10,181,160,.1);}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#0AB5A0,#089486);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:.2s;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.msg{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none;text-align:center;}
.msg.err{background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;}
.msg.ok{background:#F0FDF4;border:1px solid #86EFAC;color:#16A34A;}
.msg.info{background:#F0F9FF;border:1px solid #BAE6FD;color:#0369A1;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-dot">N</div>
    <span>Nirog<em>AI</em></span>
  </div>
  <h2>🔐 Reset Password</h2>
  <p class="sub" id="subText">Naya password set karo</p>

  <div class="msg" id="msgBox"></div>

  <div id="formSection">
    <div class="field">
      <label>NAYA PASSWORD</label>
      <div class="pw-wrap">
        <input type="password" id="pw1" placeholder="Min 6 characters"/>
        <button class="pw-eye" type="button" onclick="togglePw('pw1',this)">👁️</button>
      </div>
    </div>
    <div class="field">
      <label>CONFIRM PASSWORD</label>
      <div class="pw-wrap">
        <input type="password" id="pw2" placeholder="Dobara same password likho"/>
        <button class="pw-eye" type="button" onclick="togglePw('pw2',this)">👁️</button>
      </div>
    </div>
    <button class="btn" id="resetBtn" onclick="doReset()">🔒 Password Reset Karo</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://snsmcmxxlsolnkeukyog.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNuc21jbXh4bHNvbG5rZXVreW9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NDY1MTEsImV4cCI6MjA4ODEyMjUxMX0.svnnhqmMTdTZOmdr0TcKi3yRi_hdPeyAUYz0sOOExHY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: {
    detectSessionInUrl: true,
    flowType: 'pkce'
  }
});

function showMsg(msg, type) {
  const el = document.getElementById('msgBox');
  el.textContent = msg;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}
function togglePw(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👁️' : '🙈';
}

let sessionReady = false;

async function init() {
  showMsg('Link verify ho raha hai...', 'info');

  const params = new URLSearchParams(window.location.search);
  const tokenHash = params.get('token_hash');
  const type = params.get('type');
  const code = params.get('code');

  // Hash fragment check (implicit flow)
  const hashParams = new URLSearchParams(window.location.hash.replace('#',''));
  const accessToken = hashParams.get('access_token');
  const hashType = hashParams.get('type');

  if (tokenHash && type === 'recovery') {
    // Best flow - verify OTP with token_hash
    const { error } = await sb.auth.verifyOtp({ token_hash: tokenHash, type: 'recovery' });
    if (error) {
      showMsg('❌ Link expired ho gaya. Dobara forgot password try karo.', 'err');
      document.getElementById('resetBtn').disabled = true;
      return;
    }
    sessionReady = true;
    showMsg('✅ Verified! Naya password set karo.', 'ok');
    setTimeout(() => document.getElementById('msgBox').style.display = 'none', 1500);

  } else if (code) {
    // PKCE code exchange
    const { error } = await sb.auth.exchangeCodeForSession(window.location.href);
    if (error) {
      showMsg('❌ Link expired ho gaya. Dobara forgot password try karo.', 'err');
      document.getElementById('resetBtn').disabled = true;
      return;
    }
    sessionReady = true;
    showMsg('✅ Verified! Naya password set karo.', 'ok');
    setTimeout(() => document.getElementById('msgBox').style.display = 'none', 1500);

  } else if (accessToken && hashType === 'recovery') {
    // Implicit flow via hash
    const { error } = await sb.auth.setSession({
      access_token: accessToken,
      refresh_token: hashParams.get('refresh_token') || ''
    });
    if (error) {
      showMsg('❌ Link expired ho gaya. Dobara forgot password try karo.', 'err');
      document.getElementById('resetBtn').disabled = true;
      return;
    }
    sessionReady = true;
    showMsg('✅ Verified! Naya password set karo.', 'ok');
    setTimeout(() => document.getElementById('msgBox').style.display = 'none', 1500);

  } else {
    // Check existing session
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      sessionReady = true;
      document.getElementById('msgBox').style.display = 'none';
    } else {
      showMsg('❌ Invalid link. Dobara forgot password try karo.', 'err');
      document.getElementById('resetBtn').disabled = true;
    }
  }
}

async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;

  if (!pw1 || pw1.length < 6) { showMsg('⚠️ Password kam se kam 6 characters ka hona chahiye!', 'err'); return; }
  if (pw1 !== pw2) { showMsg('⚠️ Dono passwords match nahi kar rahe!', 'err'); return; }
  if (!sessionReady) { showMsg('⚠️ Session ready nahi hai. Page reload karo.', 'err'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Resetting...';

  const { error } = await sb.auth.updateUser({ password: pw1 });

  if (error) {
    showMsg('❌ ' + error.message, 'err');
    btn.disabled = false;
    btn.textContent = '🔒 Password Reset Karo';
    return;
  }

  showMsg('✅ Password reset ho gaya! Login page pe ja rahe hain...', 'ok');
  document.getElementById('formSection').style.display = 'none';

  setTimeout(async () => {
    await sb.auth.signOut();
    window.location.href = '/auth';
  }, 2500);
}

init();
</script>
</body>
</html>
